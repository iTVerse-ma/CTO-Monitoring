global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: cadvisor          # per-container CPU/RAM/net/disk
    static_configs:
      - targets: ['cadvisor:8080']

  - job_name: node              # host CPU/RAM/disk/filesystem/network
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: snmp-exporter     # the exporter's OWN health/metrics
    static_configs:
      - targets: ['snmp-exporter:9116']

  # --- SNMP device monitoring (network gear / hardware) -----------------------
  # Uncomment and list device IPs under `targets`. Prometheus asks snmp-exporter
  # to poll each device with the given module (see the exporter's snmp.yml).
  # - job_name: snmp
  #   static_configs:
  #     - targets:
  #         - 192.168.1.1      # e.g. a switch / router / firewall
  #   metrics_path: /snmp
  #   params:
  #     module: [if_mib]       # interface stats; other modules per snmp.yml
  #   relabel_configs:
  #     - source_labels: [__address__]
  #       target_label: __param_target
  #     - source_labels: [__param_target]
  #       target_label: instance
  #     - target_label: __address__
  #       replacement: snmp-exporter:9116
